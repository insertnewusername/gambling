<!DOCTYPE html>
<html>
<link rel="stylesheet" href="styles.css">
<body>
    <h1 id="top">Onekey RNG</h1>
    <h1 id="display">Press or hold "j"</h1>

    <img id="duck" src="" width="200">

    <script src="script.js"></script>

    <script>
        let coins = 0;
        let isHolding = false;

        const display = document.getElementById("display");
        const duckImg = document.getElementById("duck");

        function updateColours() {
            if (coins >= 100) {
                document.body.className = "bg-gold";
            } else if (coins >= 50) {
                document.body.className = "bg-orchid";
            } else if (coins >= 20) {
                document.body.className = "bg-green";
            }
        }

        // PRESS = gain coins
        document.addEventListener("keydown", (event) => {
            if (event.key === "j" && !isHolding) {
                isHolding = true;
                coins += 1;
                display.innerHTML = "Coins: " + coins;
                updateColours();
            }
        });

        // HOLD = roll (costs 100 coins)
        document.addEventListener("keyup", (event) => {
            if (event.key === "j") {
                isHolding = false;

                if (coins >= 100) {
                    coins -= 100;

                    let duckFile = rollDuck();
                    duckImg.src = "ducks/" + duckFile;

                    display.innerHTML = "Rolled: " + duckFile + " (Coins left: " + coins + ")";
                } else {
                    display.innerHTML = "Not enough coins to roll! (" + coins + ")";
                }
            }
        });
    </script>
</body>
</html>
