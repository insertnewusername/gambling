<!DOCTYPE html>
<html>
    <link rel="stylesheet" href="styles.css">
	<head>

	</head>
	<body>
        <h1 id="top">Onekey RNG</h1>
        <h1 id="display">Press "j" to start!</h1>


         <!-- Duck image -->
         <img id="duck" src="" width="200">

            <!-- Load rollDuck FIRST -->
            <script src="script.js"></script>

        <script> 
            let random_number = 0; //declare a variable to hold a number
            let coins = 0;
            let isHolding = false;
            const display = document.getElementById("display")
            document.addEventListener("keydown", (event) => {
                if (event.key === "j" && !isHolding) {
                    isHolding = true; //prevents repeat firing
                    random_number = Math.floor(Math.random() * 10) + 1; // multiply the number by 10, round it down, then add 1 so it's 1-10 instead of 0-9!
                    coins += random_number;
                    display.innerHTML = "Coins: " + coins;



                    if (coins >= 100) {
                    document.body.className = "bg-gold";
                    } else if (coins >= 50) {
                        document.body.className = "bg-orchid";
                    } else if (coins >= 20) {
                          document.body.className = "bg-green";
                    }

                }
            });


                // HOLD = roll (costs 100 coins)
        document.addEventListener("keyup", (event) => {
          if (event.key === "j") {
                isHolding = false;

             if (coins >= 100) {
                  coins -= 100;

                let duckFile = rollDuck();
                         duckImg.src = "ducks/" + duckFile;

                        display.innerHTML = "Rolled: " + duckFile + " (Coins left: " + coins + ")";
                     } else {
                          display.innerHTML = "Not enough coins to roll! (" + coins + ")";
                     }
                    }
});


        </script>
	</body>
</html>
