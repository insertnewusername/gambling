<!DOCTYPE html>
<html>
<link rel="stylesheet" href="styles.css">
<body>
<div id="header">
    <h1 id="top">Onekey RNG</h1>
</div>
   <div id="displayWrapper">
    <div id="centeritems">
    <h1 id="display">Press "j" to start!</h1>
    <div id="reached100">(Hold "j" to roll)</div>
    <div id="holdProgress">
        <div id="progressFill"></div>
        </div>
    </div>
</div>

    <!-- Roll Overlay -->
<div id="rollOverlay">
    <div id="rollWindow">
        <div id="duckCarousel"></div>
        <div id="indicator">▼</div>
        <div id="resultText"></div>
        <button id="okButton">OK</button>
    </div>
</div>

    <!-- Duck Collection Bar -->
<div id="collectionContainer">
    <!-- Yellow -->
    <div class="collection-slot" id="slot-yellow">
        <img class="duck-img" id="img-yellow" src="images/blank.png" alt="Yellow Duck">
        <div class="duck-label">Yellow</div>
        <div class="duck-count" id="count-yellow">0</div>
    </div>
    <!-- Green -->
    <div class="collection-slot" id="slot-green">
        <img class="duck-img" id="img-green" src="images/blank.png" alt="Green Duck">
        <div class="duck-label">Green</div>
        <div class="duck-count" id="count-green">0</div>
    </div>
    <!-- Blue -->
    <div class="collection-slot" id="slot-blue">
        <img class="duck-img" id="img-blue" src="images/blank.png" alt="Blue Duck">
        <div class="duck-label">Blue</div>
        <div class="duck-count" id="count-blue">0</div>
    </div>
    <!-- Pink -->
    <div class="collection-slot" id="slot-pink">
        <img class="duck-img" id="img-pink" src="images/blank.png" alt="Pink Duck">
        <div class="duck-label">Pink</div>
        <div class="duck-count" id="count-pink">0</div>
    </div>
    <!-- Red -->
    <div class="collection-slot" id="slot-red">
        <img class="duck-img" id="img-red" src="images/blank.png" alt="Red Duck">
        <div class="duck-label">Red</div>
        <div class="duck-count" id="count-red">0</div>
    </div>
    <!-- White -->
    <div class="collection-slot" id="slot-white">
        <img class="duck-img" id="img-white" src="images/blank.png" alt="White Duck">
        <div class="duck-label">White</div>
        <div class="duck-count" id="count-white">0</div>
    </div>
</div>


    <script src="script.js"></script>

<script>
    let isHolding = false;
    let holdTimer = null;
    let progressInterval = null;
    let showBarTimeout = null;      
    let progressStartTime = 0;
    var yellowduckno = 0;
    var greenduckno = 0;
    var blueduckno = 0;
    var pinkduckno = 0;
    var redduckno = 0;
    var whiteduckno = 0;
    const HOLD_DURATION = 2000;
    const BAR_SHOW_DELAY = 300;  

    const display = document.getElementById("display");
    const rollOverlay = document.getElementById("rollOverlay");
    const duckCarousel = document.getElementById("duckCarousel");
    const resultText = document.getElementById("resultText");
    const okButton = document.getElementById("okButton");
    const progressBar = document.getElementById('holdProgress');
    const progressFill = document.getElementById('progressFill');
    const reachedamount = document.getElementById('reached100');
    let coins = 9;
    display.innerHTML = "Coins: " + coins;
    updateColours();


    function updateColours() {
        // Reset first
        document.body.className = "";
        if (coins >= 100) {
            document.body.className = "gold";
        } else if (coins >= 50) {
            document.body.className = "orchid";
        } else if (coins >= 20) {
            document.body.className = "green";
        }
        // else → skyblue

        // check for coins for text
    if (coins >=100) {
        reachedamount.style.display = "block"
    }
    else {
        reachedamount.style.display = "none"
    }
    }

    function showProgressBar() {
        progressBar.style.display = 'block';
        progressFill.style.width = '0%';
        progressStartTime = Date.now();

        if (progressInterval) clearInterval(progressInterval);
        progressInterval = setInterval(() => {
            const elapsed = Date.now() - progressStartTime;
            const progress = Math.min(elapsed / HOLD_DURATION, 1);
            progressFill.style.width = (progress * 100) + '%';
        }, 50);
    }

    function hideProgressBar() {
        progressBar.style.display = 'none';
        progressFill.style.width = '0%';
        if (progressInterval) {
            clearInterval(progressInterval);
            progressInterval = null;
        }
        if (showBarTimeout) {
            clearTimeout(showBarTimeout);
            showBarTimeout = null;
        }
    }

    // PRESS = random coins
    document.addEventListener("keydown", (event) => {
        if (event.key === "j" && !isHolding && rollOverlay.style.display !== "flex") {
            isHolding = true;
            
            // --- Random coin gain---
            let random_number = Math.floor(Math.random() * 10) + 1;
            coins += random_number;
            display.innerHTML = "Coins: " + coins;
            updateColours();

            // --- Wait 300ms before showing bar---
            showBarTimeout = setTimeout(() => {
                if (isHolding) {
                    showProgressBar();
                }
            }, BAR_SHOW_DELAY);

            // --- Start timer ---
            holdTimer = setTimeout(() => {
                if (isHolding) {
                    if (coins >= 100) {
                        coins -= 100;
                        let duckFile = rollDuck();
                        display.innerHTML = `Rolled: ${duckFile}`;
                        updateduckcount(duckFile);
                    } else {
                        display.innerHTML = "Not enough coins to roll! (" + coins + ")";
                    }
                    // Reset progress bar
                    hideProgressBar();
                }
            }, HOLD_DURATION);
        }
    });

    // RELEASE = cancel roll
    document.addEventListener("keyup", (event) => {
        if (event.key === "j") {
            isHolding = false;
            clearTimeout(holdTimer);
            hideProgressBar(); 
        }
    });
</script>
</body>
</html>
