<!DOCTYPE html>
<html>
    <link rel="stylesheet" href="styles.css">
	<head>
        <style>
        </style>
	</head>
	<body>
        <h1 id="display">Press "j" to start!</h1>
        <script> 
            let random_number = 0; //declare a variable to hold a number
            let coins = 0;
            const display = document.getElementById("display")
            document.addEventListener("keydown", (event) => {
                if (event.key == "j") {
                    random_number = Math.floor(Math.random() * 10) + 1; // multiply the number by 10, round it down, then add 1 so it's 1-10 instead of 0-9!
                    coins += random_number;
                    display.innerHTML = "Rolled " + random_number + "! Coins: " + coins;



                    if (coins >= 100) {
                    document.body.className = "bg-gold";
                    } else if (coins >= 50) {
                        document.body.className = "bg-orchid";
                    } else if (coins >= 20) {
                          document.body.className = "bg-green";
                    }

                }
            });


        </script>
	</body>
</html>
