<!DOCTYPE html>
<html>
<link rel="stylesheet" href="styles.css">
<body>
    <div><h1 id="top">Onekey RNG</h1></div>
    <div><h1 id="display">Press "j" to start!</h1></div>

    <!-- Roll Overlay -->
<div id="rollOverlay">
    <div id="rollWindow">
        <div id="duckCarousel"></div>
        <div id="indicator">▼</div>
        <div id="resultText"></div>
        <button id="okButton">OK</button>
    </div>
</div>


    <script src="script.js"></script>

<script>
    let coins = 0;
    let isHolding = false;
    let holdTimer = null;

    const display = document.getElementById("display");
    const duckImg = document.getElementById("duck");
    const rollOverlay = document.getElementById("rollOverlay");
    const duckCarousel = document.getElementById("duckCarousel");
    const resultText = document.getElementById("resultText");
    const okButton = document.getElementById("okButton");

    okButton.addEventListener("click", () => {
     rollOverlay.style.display = "none";
    display.innerHTML = "Coins: " + coins; // update coin display
    updateColours();
    });


    function updateColours() {
        if (coins >= 100) {
            document.body.className = "bg-gold";
        } else if (coins >= 50) {
            document.body.className = "bg-orchid";
        } else if (coins >= 20) {
            document.body.className = "bg-green";
        }
        // else → skyblue
    }

    // PRESS = random coins
    document.addEventListener("keydown", (event) => {
        if (event.key === "j" && !isHolding) {
            isHolding = true;

            // random coin gain (your original feature)
            let random_number = Math.floor(Math.random() * 10) + 1;
            coins += random_number;
            display.innerHTML = "Coins: " + coins;

            updateColours();

            // start 3-second hold timer
            holdTimer = setTimeout(() => {
                if (isHolding) {
                    if (coins >= 100) {
                        coins -= 100;

                        let duckFile = rollDuck();
                      startRollAnimation(duckFile);

                    } else {
                        display.innerHTML =
                            "Not enough coins to roll! (" + coins + ")";
                    }
                }
            }, 2000); // 2 seconds
        }
    });

    // RELEASE = cancel roll
    document.addEventListener("keyup", (event) => {
        if (event.key === "j") {
            isHolding = false;
            clearTimeout(holdTimer);
        }
    });
</script>
</body>
</html>
